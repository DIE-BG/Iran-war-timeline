<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Last-Modified" content="0">
    <meta http-equiv="Cache-Control" content="no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">

    <title>Línea de Tiempo Interactiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="data.js?v=20260317_v2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "brand-green": "#213830",
                        "brand-red": "#781f0e",
                        "brand-bg": "#f8f9fa",
                    },
                    fontFamily: {
                        sans: ['"Libre Franklin"', 'sans-serif'],
                        serif: ['"Merriweather"', 'serif'],
                    }
                },
            },
        };
    </script>

<style>
  .timeline-card {
    transition: all 0.3s ease;
  }
  .timeline-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }
  
  .timeline-marker {
    transition: all 0.3s ease;
  }
  .timeline-item:hover .timeline-marker {
    background-color: #781f0e;
    transform: translateX(-50%) scale(1.2);
    border-color: #f8f9fa;
  }
</style>

</head>

<body class="bg-brand-bg text-gray-800 min-h-screen overflow-x-hidden antialiased">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        
        <!-- Header -->
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-bold text-brand-green mb-4 font-serif">
                Guerra Iran - Estados Unidos
            </h1>
            <div class="h-1 w-24 bg-brand-red mx-auto rounded"></div>
            <p class="mt-4 text-gray-600 max-w-2xl mx-auto font-serif">
                Línea de tiempo
            </p>
        </div>

        <!-- Timeline Container -->
        <div class="relative max-w-5xl mx-auto">
            <!-- Vertical Line (Central for Desktop, Left for Mobile) -->
            <div class="absolute left-6 md:left-1/2 top-0 bottom-0 w-1 bg-brand-green/20 md:transform md:-translate-x-1/2 rounded-full"></div>

            <div id="timeline-app" class="relative">
                <!-- Content injected by JS -->
            </div>
        </div>

    </div>

    <script>
        function renderTimeline(data) {
            const container = document.getElementById("timeline-app");
            
            // Invertimos los datos para mostrar primero lo más reciente
            const sortedData = [...data].reverse();

            let html = '<div class="space-y-8">';
            
            sortedData.forEach((item, index) => {
                const isEven = index % 2 === 0;
                
                html += `
                <div class="timeline-item flex flex-col md:flex-row items-start md:items-center justify-between w-full group relative">
                    
                    <!-- Left Side (Content for Even, Empty/Hidden for Odd) -->
                    <div class="w-full md:w-[45%] ${isEven ? 'pl-16 md:pl-0 md:pr-8 md:text-right' : 'hidden md:block'}">
                        ${isEven ? renderCard(item) : ''}
                    </div>

                    <!-- Marker (Center/Left) -->
                    <div class="absolute left-6 md:left-1/2 w-5 h-5 bg-brand-green rounded-full border-4 border-white shadow-md transform -translate-x-1/2 z-10 timeline-marker mt-6 md:mt-0"></div>

                    <!-- Right Side (Content for Odd, Empty/Hidden for Even) -->
                    <div class="w-full md:w-[45%] ${!isEven ? 'pl-16 md:pl-8 md:text-left' : 'hidden md:block'}">
                         ${!isEven ? renderCard(item) : ''}
                    </div>
                </div>`;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        function renderCard(item) {
            return `
                <div class="timeline-card bg-white p-5 rounded-lg shadow border-l-4 border-brand-red mb-2">
                    <time class="block text-sm font-bold text-brand-red uppercase tracking-wide mb-2 font-sans">
                        ${item.fecha}
                    </time>
                    <p class="text-gray-700 text-sm leading-relaxed font-serif">
                        ${item.resumen}
                    </p>
                </div>
            `;
        }

        // Ensure data is loaded
        if (typeof newsData !== 'undefined') {
            renderTimeline(newsData);
        }
    </script>
</body>
</html>
